<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Criando Bandeiras com Divs</title>
    <link rel="stylesheet" href="css/ex05.css" />
  </head>
  <body>
    <table border="2px" width="60%">
      <tr bgcolor="#D3D3D3">
        <!-------------INICIO TABELA------------>
        <!-------Titulos------->
        <td>Tipo de divisão</td>
        <td>Países</td>
        <td>Bandeira</td>
      </tr>
      <tr>
        <!------ITALIA------->
        <td>Listras Verticais</td>
        <td>Itália, Bélgica</td>
        <td>
          <div class="italia">
            <div class="verde"></div>
            <div class="branco"></div>
            <div class="vermelho"></div>
          </div>
        </td>
      </tr>

      <tr>
        <!-------POLONIA-------->
        <td>Listras Horizontais</td>
        <td>Polônia, Alemanha</td>
        <td>
          <div class="polonia">
            <div class="branco-2"></div>
            <div class="vermelho-2"></div>
          </div>
        </td>
      </tr>

      <tr>
        <!-------INGLATERRA-------->
        <td>Cruz de Formato Nórdico/São Jorge</td>
        <td>Inglaterra, Suécia</td>
        <td>
          <div class="inglaterra">
            <div class="listra-1"></div>
            <div class="listra-2"></div>
          </div>
        </td>
      </tr>

      <tr>
        <!---------BRASIL--------->
        <td>Formas Geométricas Acopladas</td>
        <td>Brasil</td>
        <td>
          <div class="brasil">
            <div class="losango">
              <div class="circulo"></div>
            </div>
          </div>
        </td>
      </tr>
      <!-------- FIM TABELA --------->
    </table>
  </body>
</html>
